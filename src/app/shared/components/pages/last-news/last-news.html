<div class="last-news">
  <div class="last-news__header">
    <h1 class="last-news__title">Последние новости</h1>
    <a class="last-news__title-link" [routerLink]="'news'">Посмотреть все</a>
  </div>
  <div class="last-news__cards">
    @for (news of newsList; track news.id) {
      <sm-card [news]="news" [fixedHeight]="true"></sm-card>
    }
  </div>
</div>
