<a [routerLink]="[baseRoute, data.id]" class="card" [class.card--fixed-height]="fixedHeight">
    <div class="card__wrapper">
      <div class="card__images">
        <img class="card__images-img" [ngSrc]="data.image" [alt]="data.title" [priority]="priority" width="373" height="121">
        <div class="card__tag">
          <sm-tag [label]="data.tag"></sm-tag>
        </div>
      </div>
      <div class="card__text">
        <h3 class="card__title">{{ data.title }}</h3>
        <p class="card__desc">{{ data.desc }}</p>
        <div class="card__date">{{ data.createdAt }}</div>
      </div>
    </div>
</a>
