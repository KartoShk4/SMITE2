<header class="header">
  <div class="header__container container">
    <nav class="header__menu">
      <sm-logo></sm-logo>

      <button
        class="header__burger"
        [class.header__burger--active]="isMenuOpen"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen"
        aria-label="Меню">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="header__list" [class.header__list--open]="isMenuOpen">
        <li
          class="header__item"
          routerLinkActive="header__item--active"
          [routerLinkActiveOptions]="{ exact: true }">
          <a class="header__link" [routerLink]="'/'" (click)="closeMenu()">Главная</a>
        </li>

        <li
          class="header__item"
          routerLinkActive="header__item--active">
          <a class="header__link" [routerLink]="'/news'" (click)="closeMenu()">Новости</a>
        </li>

        <li
          class="header__item"
          routerLinkActive="header__item--active">
          <a class="header__link" [routerLink]="'/update'" (click)="closeMenu()">Обновления</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
